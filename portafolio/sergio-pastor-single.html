<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO: sobrescrito dinámicamente por portafolio.js -->
  <title>Sergio Pastor — Single | UMD Films</title>
  <meta name="description" content="Sergio Pastor — Single — videoclip producido por UMD Films en 2024." />
  <meta name="robots" content="index, follow" />

  <!-- Favicon -->
  <link rel="icon"             href="../assets/logo/favicon.ico" />
  <link rel="icon"             href="../assets/logo/favicon.svg"  type="image/svg+xml" />
  <link rel="apple-touch-icon" href="../assets/logo/apple-touch-icon.png" />

  <!-- Fuentes -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />

  <!-- CSS -->
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/portafolio.css" />
</head>
<body>

  <!-- Nav -->
  <header class="nav" id="nav" role="banner"></header>

  <main>

    <!-- ======= HERO DEL PROYECTO =======
         Relleno por portafolio.js con:
           - Imagen de portada
           - Título, categoría (badge), año, cliente
           - Botón volver al portafolio
    ======= -->
    <section class="film-hero" id="filmHero" aria-label="Proyecto"></section>


    <!-- ======= CUERPO DEL PROYECTO =======
         Grid: tráiler + sinopsis (izquierda) · ficha técnica sticky (derecha)
    ======= -->
    <section class="film-body section">
      <div class="container film-body__grid">

        <!-- Columna principal: tráiler + sinopsis -->
        <div>
          <!-- Tráiler: iframe de YouTube si hay URL, placeholder si no -->
          <div class="film-trailer reveal" id="filmTrailer"></div>

          <p class="film-synopsis-title">Sinopsis</p>
          <div class="film-synopsis reveal" id="filmSynopsis"></div>
        </div>

        <!-- Ficha técnica (sticky en desktop, estilo cartelera de cine) -->
        <aside id="filmSheet" aria-label="Ficha técnica"></aside>

      </div>
    </section>


    <!-- ======= EQUIPO DEL PROYECTO =======
         Miembros que participaron (cruzado desde portfolio.team_ids y team.json)
         Click en miembro → equipo/[id].html
         Se oculta si no hay team_ids
    ======= -->
    <section class="film-team section" id="filmTeam">
      <div class="container">
        <p class="eyebrow reveal">Créditos</p>
        <h2 class="section-title reveal">Equipo del proyecto</h2>
        <div class="film-team__grid" id="filmTeamGrid"></div>
      </div>
    </section>


    <!-- ======= GALERÍA =======
         Fotos del rodaje desde portfolio.photos_extra[]
         Se oculta si el array está vacío
    ======= -->
    <section class="film-gallery section" id="filmGallery">
      <div class="container">
        <p class="eyebrow reveal">Detrás de las cámaras</p>
        <h2 class="section-title reveal">Galería</h2>
        <div class="film-gallery__grid" id="filmGalleryGrid"></div>
      </div>
    </section>

  </main>

  <!-- Footer -->
  <footer class="footer" id="footer" role="contentinfo"></footer>

  <!-- FAB WhatsApp -->
  <a href="#" class="fab-wa" target="_blank" rel="noopener" aria-label="Contactar por WhatsApp">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.890-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/>
    </svg>
  </a>

  <!--
    SCRIPTS — ORDEN OBLIGATORIO:
      1. shared.js  (utilidades + window.UMD)
      2. portafolio.js
  -->
  <script src="../js/shared.js"></script>
  <script src="../js/portafolio.js"></script>

</body>
</html>
