<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO: título y description se sobrescriben dinámicamente por equipo.js -->
  <title>Iván — Director de Fotografía & Gaffer · Cine & Teatro | UMD Films</title>
  <meta name="description" content="Iván, Director de Fotografía & Gaffer · Cine & Teatro en UMD Films Málaga." />
  <meta name="robots" content="index, follow" />

  <!-- Open Graph básico (equipo.js no sobrescribe OG por simplicidad) -->
  <meta property="og:type"   content="profile" />
  <meta property="og:locale" content="es_ES" />

  <!-- Favicon -->
  <link rel="icon"             href="../assets/logo/favicon.ico" />
  <link rel="icon"             href="../assets/logo/favicon.svg"  type="image/svg+xml" />
  <link rel="apple-touch-icon" href="../assets/logo/apple-touch-icon.png" />

  <!-- Fuentes -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />

  <!-- CSS: global + específico de esta sección -->
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/equipo.css" />
</head>
<body>

  <!-- Nav: renderizado por shared.js > renderNav() -->
  <header class="nav" id="nav" role="banner"></header>

  <main>

    <!-- ======= HERO DEL PERFIL =======
         Relleno por equipo.js con:
           - Foto de portada del miembro
           - Nombre, rol, especialidades
           - Botón volver al equipo
    ======= -->
    <section class="profile-hero" id="profileHero" aria-label="Perfil de miembro"></section>


    <!-- ======= BIO + FICHA TÉCNICA =======
         Grid: bio + socials (izquierda) · ficha sticky (derecha)
         Relleno por equipo.js
    ======= -->
    <section class="profile-body" id="profileBody">
      <div class="container profile-body__grid">

        <!-- Bio y redes sociales -->
        <div>
          <p class="eyebrow">Sobre mí</p>
          <div id="profileBio"></div>
          <div class="profile-socials" id="profileSocials"></div>
        </div>

        <!-- Ficha lateral (sticky en desktop) -->
        <aside class="profile-sidebar" id="profileFicha" aria-label="Ficha del miembro"></aside>

      </div>
    </section>


    <!-- ======= FOTOS EXTRA =======
         Galería de fotos adicionales del miembro.
         Si photos_extra está vacío en team.json, esta sección se oculta.
    ======= -->
    <section class="profile-photos section" id="profilePhotos">
      <div class="container">
        <p class="eyebrow reveal">Galería</p>
        <h2 class="section-title reveal">Más fotos</h2>
        <div class="profile-photos__grid" id="profilePhotosGrid"></div>
      </div>
    </section>


    <!-- ======= PROYECTOS =======
         Proyectos en los que ha participado el miembro.
         Se cruzan member.projects[] y portfolio.team_ids[] en equipo.js.
         Si no hay proyectos, esta sección se oculta.
    ======= -->
    <section class="profile-projects section" id="profileProjects">
      <div class="container">
        <p class="eyebrow reveal">Filmografía</p>
        <h2 class="section-title reveal">Proyectos</h2>
        <div class="profile-projects__grid portfolio__grid" id="profileProjectsGrid"></div>
      </div>
    </section>

  </main>

  <!-- Footer: renderizado por shared.js > renderFooter() -->
  <footer class="footer" id="footer" role="contentinfo"></footer>

  <!-- FAB WhatsApp -->
  <a href="#" class="fab-wa" target="_blank" rel="noopener" aria-label="Contactar por WhatsApp">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.890-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/>
    </svg>
  </a>

  <!--
    SCRIPTS — ORDEN OBLIGATORIO:
      1. shared.js  (utilidades + window.UMD)
      2. equipo.js  (lógica de esta página)
    Las rutas son relativas a la subcarpeta equipo/
  -->
  <script src="../js/shared.js"></script>
  <script src="../js/equipo.js"></script>

</body>
</html>
