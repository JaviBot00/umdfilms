<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />

  <!-- Theme: light / dark
      Applied to <html> so CSS can use it with [data-theme="light"] or [data-theme="dark"]
      Populated dynamically from localStorage or media query (prefers-color-scheme)
  -->
  <script>
  (function () {
    var stored = localStorage.getItem('umd-theme');
    var theme = (stored === 'light' || stored === 'dark')
      ? stored
      : (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
    document.documentElement.setAttribute('data-theme', theme);
  })();
  </script>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO: title, description and canonical are dynamically overwritten by portfolio.js -->
  <title>Proyecto | UMD Films — Productora Audiovisual Málaga</title>
  <meta name="description" content="Proyecto de UMD Films, productora audiovisual en Málaga." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://umdfilms.com/portfolio/" />

  <!-- Open Graph (portfolio.js overwrites title, description, image, url) -->
  <meta property="og:type"      content="video.other" />
  <meta property="og:locale"    content="es_ES" />
  <meta property="og:site_name" content="UMD Films" />
  <meta property="og:title"     content="Proyecto | UMD Films Málaga" />
  <meta property="og:description" content="Descubre nuestros proyectos de producción audiovisual en Málaga." />
  <meta property="og:image"     content="https://umdfilms.com/assets/logo/logo-umd-films.svg" />
  <meta property="og:url"       content="https://umdfilms.com/portfolio/" />

  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:title"       content="Proyecto | UMD Films Málaga" />
  <meta name="twitter:description" content="Descubre nuestros proyectos de producción audiovisual en Málaga." />
  <meta name="twitter:image"       content="https://umdfilms.com/assets/logo/logo-umd-films.svg" />

  <!-- Favicon -->
  <link rel="icon"             href="../assets/logo/favicon.ico" />
  <link rel="icon"             href="../assets/logo/favicon.svg"  type="image/svg+xml" />
  <link rel="apple-touch-icon" href="../assets/logo/apple-touch-icon.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap"
        rel="stylesheet" media="print" onload="this.media='all'" />
  <noscript>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
  </noscript>

  <!-- CSS -->
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/portfolio.css" />
</head>
<body>

  <a href="#contenido" class="skip-link">Saltar al contenido</a>

  <!-- Nav -->
  <header class="nav" id="nav" role="banner"></header>

  <main id="contenido">

    <!-- ======= PROJECT HERO =======
         Populated by portfolio.js with:
           - Cover image
           - Title, category (badge), year, client
           - Back to portfolio button
    ======= -->
    <section class="film-hero" id="filmHero" aria-label="Proyecto"></section>


    <!-- ======= PROJECT BODY =======
         Grid: trailer + synopsis (left) · sticky technical sheet (right)
    ======= -->
    <section class="film-body section">
      <div class="container film-body__grid">

        <!-- Main column: trailer + synopsis -->
        <div>
          <!-- Trailer: YouTube iframe if URL exists, placeholder otherwise -->
          <div class="film-trailer reveal" id="filmTrailer"></div>

          <p class="film-synopsis-title">Sinopsis</p>
          <div class="film-synopsis reveal" id="filmSynopsis"></div>
        </div>

        <!-- Technical sheet (sticky on desktop, movie poster style) -->
        <aside id="filmSheet" aria-label="Ficha técnica"></aside>

      </div>
    </section>


    <!-- ======= PROJECT TEAM =======
         Members who participated (cross-referenced from portfolio.team_ids and team.json)
         Click member → team/[id].html
         Hidden if no team_ids
    ======= -->
    <section class="film-team section" id="filmTeam">
      <div class="container">
        <p class="eyebrow reveal">Créditos</p>
        <h2 class="section-title reveal">Equipo del proyecto</h2>
        <div class="film-team__grid" id="filmTeamGrid"></div>
      </div>
    </section>


    <!-- ======= GALLERY =======
         Behind-the-scenes photos from portfolio.photos_extra[]
         Hidden if array is empty
    ======= -->
    <section class="film-gallery section" id="filmGallery">
      <div class="container">
        <p class="eyebrow reveal">Detrás de las cámaras</p>
        <h2 class="section-title reveal">Galería</h2>
        <div class="film-gallery__grid" id="filmGalleryGrid"></div>
      </div>
    </section>

  </main>

  <!-- Footer -->
  <footer class="footer" id="footer" role="contentinfo"></footer>

  <!-- FAB WhatsApp -->
  <a href="#" class="fab-wa" target="_blank" rel="noopener" aria-label="Contactar por WhatsApp">

  <!--
    SCRIPTS — REQUIRED ORDER:
      1. shared.js    (utilities + window.UMD)
      2. portfolio.js
  -->
  <script src="../js/shared.js"></script>
  <script src="../js/portfolio.js"></script>

</body>
</html>
