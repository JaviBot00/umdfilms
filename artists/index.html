<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <script>
  (function () {
    var stored = localStorage.getItem('umd-theme');
    var theme = (stored === 'light' || stored === 'dark')
      ? stored
      : (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
    document.documentElement.setAttribute('data-theme', theme);
  })();
  </script>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Representación de Artistas | UMD Films Málaga</title>
  <meta name="description" content="Representación y gestión de artistas: equipo UMD Films y colaboradores externos. Málaga." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://umdfilms.com/artists/" />

  <link rel="icon" href="../assets/logo/favicon.ico" />
  <link rel="icon" href="../assets/logo/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="../assets/logo/apple-touch-icon.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap"
        rel="stylesheet" media="print" onload="this.media='all'" />
  <noscript>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
  </noscript>

  <!-- Solo style.css: .page-hero, .card-grid y .team-card ya viven aquí -->
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

  <a href="#contenido" class="skip-link">Saltar al contenido</a>
  <header class="nav" id="nav" role="banner"></header>

  <main id="contenido">
    <section class="page-hero" aria-label="Representación de artistas">
      <div class="container">
        <p class="eyebrow reveal">UMD Films</p>
        <h1 class="section-title reveal">Representación<br /><em>de artistas</em></h1>
        <p class="lead-text reveal" style="max-width:560px">
          Gestión de marca en redes y representación con estrategia creativa,
          tanto para el equipo de UMD Films como para colaboradores externos.
        </p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="portfolio__filters reveal" id="artistsFilters"
             role="group" aria-label="Filtrar por tipo"></div>
        <div class="card-grid" id="artistsGrid" role="list"></div>
      </div>
    </section>
  </main>

  <footer class="footer" id="footer" role="contentinfo"></footer>

  <a class="fab-top" aria-label="Volver arriba"></a>

  <script src="../js/shared.js"></script>
  <script src="../js/artists.js"></script>
</body>
</html>
