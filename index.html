<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />

  <!-- Theme: light / dark
      Applied to <html> so CSS can use it with [data-theme="light"] or [data-theme="dark"]
      Populated dynamically from localStorage or media query (prefers-color-scheme)
  -->
  <script>
  (function () {
    var stored = localStorage.getItem('umd-theme');
    var theme = (stored === 'light' || stored === 'dark')
      ? stored
      : (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
    document.documentElement.setAttribute('data-theme', theme);
  })();
  </script>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Basic SEO (dynamic values are populated by main.js from config.json) -->
  <title>UMD Films | Productora Audiovisual en Málaga</title>
  <meta name="description" content="UMD Films: productora audiovisual en Málaga. Videoclips, publicidad, cine, producción musical y más. Con alma malagueña y alcance nacional." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://umdfilms.com/" />

  <!-- Open Graph -->
  <meta property="og:type"        content="website" />
  <meta property="og:url"         content="https://umdfilms.com/" />
  <meta property="og:title"       content="UMD Films | Productora Audiovisual en Málaga" />
  <meta property="og:description" content="Videoclips, publicidad, cine y producción musical con alma malagueña y alcance nacional." />
  <meta property="og:image"       content="https://umdfilms.com/assets/logo/og-cover.png" />
  <meta property="og:locale"      content="es_ES" />

  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:title"       content="UMD Films | Productora Audiovisual en Málaga" />
  <meta name="twitter:description" content="Videoclips, publicidad, cine y producción musical." />
  <meta name="twitter:image"       content="https://umdfilms.com/assets/logo/og-cover.png" />

  <!-- Favicon (replace with real one when available) -->
  <link rel="icon"             href="assets/logo/favicon.svg"   type="image/svg+xml"/>
  <link rel="icon"             href="assets/logo/favicon.ico"   type="image/x-icon" sizes="any"/>
  <link rel="apple-touch-icon" href="assets/logo/apple-touch-icon.png" sizes="180x180" />

  <!-- Fonts: preconnect first to reduce latency -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap"
        rel="stylesheet" media="print" onload="this.media='all'" />
  <noscript>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
  </noscript>

  <!-- Global CSS -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <a href="#contenido" class="skip-link">Saltar al contenido</a>

  <!-- ======= NAV =======
       Dynamically rendered by shared.js > renderNav()
       from data/config.json
  ======= -->
  <header class="nav" id="nav" role="banner"></header>

  <main id="contenido">

  <!-- ======= HERO =======
       Background video + multi-layer overlay for readability
       Content: eyebrow, title, subtitle, CTAs, scroll indicator
  ======= -->
  <section class="hero" id="hero" aria-label="Portada UMD Films">
    <!-- Background video. poster: static image while loading -->
    <video class="hero__video"
           width="1920" height="1080"
           autoplay muted loop playsinline
           preload="metadata"
           poster="assets/portfolio/hero-poster.jpg"
           aria-hidden="true">
      <source src="assets/video/hero.webm" type="video/webm" />
      <source src="assets/video/hero.mp4"  type="video/mp4" />
    </video>

    <!-- Overlay: multi-layer gradient. See css/style.css > .hero__overlay -->
    <div class="hero__overlay" aria-hidden="true"></div>

    <!-- Decorative red side line -->
    <div class="hero__redline" aria-hidden="true"></div>

    <!-- Main content -->
    <div class="hero__content">
      <p class="hero__eyebrow reveal" id="heroEyebrow"></p>
      <h1 class="hero__title reveal d1" id="heroTitle"></h1>
      <p class="hero__sub reveal d2" id="heroSub"></p>
      <div class="hero__actions reveal d3" id="heroActions"></div>
    </div>

    <!-- Animated scroll indicator -->
    <div class="hero__scroll" aria-hidden="true">
      <span id="heroScrollLabel"></span>
      <div class="hero__scroll-line"></div>
    </div>
  </section>

  <!-- ======= TRUST BAR =======
       Client logos in infinite marquee
       Duplicated by JS (shared.js) for continuous loop
  ======= -->
  <section class="trust" aria-label="Clientes">
    <p class="trust__label" id="trustLabel"></p>
    <div class="trust__track" aria-hidden="true">
      <div class="trust__inner" id="trustInner"></div>
    </div>
  </section>

  <!-- ======= ABOUT =======
       Grid: text left + stats right
       "Málaga" in red (see <em> in h2)
       Stats calculated from JSON in main.js > statsData
  ======= -->
  <section class="about section" id="nosotros">
    <div class="container about__grid">
      <div class="about__text">
        <p class="eyebrow reveal" id="aboutEyebrow"></p>
        <h2 class="section-title reveal" id="aboutTitle"></h2>
        <div id="aboutParagraphs"></div>
        <div class="about__actions reveal" id="aboutActions"></div>
      </div>

      <!-- Stats: generated in main.js from JSON.
           statsGrid is populated dynamically with:
             - portfolio.length  → Completed projects
             - team.length       → Professionals
             - current year - founded_year → Years
             - config.location   → Location
      -->
      <div class="stats reveal" id="statsGrid" role="list" aria-label="Estadísticas UMD Films"></div>
    </div>
  </section>

  <!-- ======= SERVICES =======
       Grid generated from data/services.json by main.js
       On desktop: hover on card shows video preview
       "Equipment rental" service links to equipment/index.html
  ======= -->
  <section class="services section" id="servicios">
    <div class="container">
      <p class="eyebrow reveal" id="servicesEyebrow"></p>
      <h2 class="section-title reveal" id="servicesTitle"></h2>

      <!-- Grid generated by main.js from services.json -->
      <div class="services__grid reveal" id="servicesGrid" role="list"></div>
    </div>

    <!-- Floating video preview on hover (desktop only, see main.js) -->
    <div class="svc-preview" id="svcPreview" aria-hidden="true">
      <video id="svcPreviewVid" muted loop playsinline></video>
    </div>
  </section>

  <!-- ======= PORTFOLIO =======
       Filters generated from unique categories in JSON
       Cards: click → portfolio/[id].html
       CTA: link to YouTube channel
  ======= -->
  <section class="portfolio section" id="portafolio">
    <div class="container">
      <p class="eyebrow reveal" id="portfolioEyebrow"></p>
      <h2 class="section-title reveal" id="portfolioTitle"></h2>

      <!-- Project grid, generated by main.js -->
      <div class="portfolio__grid" id="portfolioGrid"></div>

      <div class="portfolio__cta reveal" id="portfolioCta"></div>
      <!-- <a href="portfolio/index.html" class="btn btn-outline">Ver todos los proyectos ↗</a> -->
    </div>
  </section>

  <!-- ======= TEAM =======
       Cards generated from data/team.json by main.js
       Click card → team/[id].html
       Stats: team.length calculated automatically
  ======= -->
  <section class="team section" id="equipo">
    <div class="container">
      <p class="eyebrow reveal" id="teamEyebrow"></p>
      <h2 class="section-title reveal" id="teamTitle"></h2>

      <!-- Grid generated by main.js -->
      <div class="team__grid" id="teamGrid" role="list"></div>
      <!-- <a href="team/index.html" class="btn btn-outline">Ver equipo completo ↗</a> -->
    </div>
  </section>

  <!-- ======= CTA BAND =======
       Central conversion strip
       Links to contact section
  ======= -->
  <section class="cta-band" aria-label="Llamada a la acción">
    <div class="container">
      <h2 class="cta-band__title reveal" id="ctaBandTitle"></h2>
      <p class="cta-band__sub reveal d1" id="ctaBandSub"></p>
      <a href="#" class="btn btn-primary btn-lg reveal d2" id="ctaBandBtn"></a>
    </div>
  </section>

  <!-- ======= CONTACT =======
       Grid: info left + form right
       The form does NOT send email (would require backend).
       On submit it redirects to WhatsApp with the formatted message.
       To connect a real backend: edit the function in main.js > contactForm
  ======= -->
  <section class="contact section" id="contacto">
    <div class="container contact__grid">

      <!-- Contact info -->
      <div class="contact__info">
        <p class="eyebrow reveal" id="contactEyebrow"></p>
        <h2 class="section-title reveal" id="contactTitle"></h2>
        <p class="contact__body reveal" id="contactBody"></p>
        <div class="contact__links reveal" id="contactLinks"></div>
      </div>

      <!-- Form -->
      <form class="contact__form reveal" id="contactForm" novalidate aria-label="Formulario de contacto">
        <div class="form-group">
          <label for="name"></label>
          <input type="text" id="name" name="name" placeholder="Tu nombre" required autocomplete="name" />
        </div>
        <div class="form-group">
          <label for="email"></label>
          <input type="email" id="email" name="email" placeholder="tu@email.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="service"></label>
          <select id="service" name="service"></select>
        </div>
        <div class="form-group">
          <label for="message"></label>
          <textarea id="message" name="message" rows="4" placeholder="Describe tu idea..."></textarea>
        </div>
        <button type="submit" class="btn btn-primary btn-full"></button>
        <p class="form-note"></p>
      </form>

    </div>
  </section>

  </main>

  <!-- ======= FOOTER =======
       Dynamically rendered by shared.js > renderFooter()
       Includes: logo, social media (inline SVG), navigation, copyright
       Copyright: © year UMD Films · Developed by Javier + Claude
  ======= -->
  <footer class="footer" id="footer" role="contentinfo"></footer>

  <!-- ======= FAB WHATSAPP =======
       Always-visible floating button.
       href: dynamically populated from config.json by shared.js > renderFAB()
  ======= -->
  <a href="#" class="fab-wa" id="fabWa" target="_blank" rel="noopener" aria-label="Contact via WhatsApp"></a>

  <!-- ======= SCRIPTS =======
       Required load order:
         1. shared.js  → exposes window.UMD (common utilities)
         2. main.js    → home page specific logic
       Do not change the order.
  ======= -->
  <script src="js/shared.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
