<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />

  <!-- Theme: light / dark
      Applied to <html> so CSS can use it with [data-theme="light"] or [data-theme="dark"]
      Populated dynamically from localStorage or media query (prefers-color-scheme)
  -->
  <script>
  (function () {
    var stored = localStorage.getItem('umd-theme');
    var theme = (stored === 'light' || stored === 'dark')
      ? stored
      : (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
    document.documentElement.setAttribute('data-theme', theme);
  })();
  </script>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO: title, description and canonical are dynamically overwritten by team.js -->
  <title>Iván Ambrosio — Editor y VFX Artist | UMD Films Málaga</title>
  <meta name="description" content="Iván Ambrosio, Editor y VFX Artist en UMD Films Málaga. Conoce a nuestro equipo." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://umdfilms.com/team/" />

  <!-- Open Graph (team.js overwrites title, description, image, url) -->
  <meta property="og:type"      content="profile" />
  <meta property="og:locale"    content="es_ES" />
  <meta property="og:site_name" content="UMD Films" />
  <meta property="og:title"     content="Equipo | UMD Films Málaga" />
  <meta property="og:description" content="Conoce al equipo de UMD Films, productora audiovisual en Málaga." />
  <meta property="og:image"     content="https://umdfilms.com/assets/logo/logo-umd-films.svg" />
  <meta property="og:url"       content="https://umdfilms.com/team/" />

  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:title"       content="Equipo | UMD Films Málaga" />
  <meta name="twitter:description" content="Conoce al equipo de UMD Films, productora audiovisual en Málaga." />
  <meta name="twitter:image"       content="https://umdfilms.com/assets/logo/logo-umd-films.svg" />

  <!-- Favicon -->
  <link rel="icon"             href="../assets/logo/favicon.ico" />
  <link rel="icon"             href="../assets/logo/favicon.svg"  type="image/svg+xml" />
  <link rel="apple-touch-icon" href="../assets/logo/apple-touch-icon.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap"
        rel="stylesheet" media="print" onload="this.media='all'" />
  <noscript>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
  </noscript>

  <!-- CSS: global + section-specific -->
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/team.css" />
</head>
<body>

  <a href="#contenido" class="skip-link">Saltar al contenido</a>

  <!-- Nav: rendered by shared.js > renderNav() -->
  <header class="nav" id="nav" role="banner"></header>

  <main id="contenido">

    <!-- ======= PROFILE HERO =======
         Populated by team.js with:
           - Member cover photo
           - Name, role, specialties
           - Back to team button
    ======= -->
    <section class="profile-hero" id="profileHero" aria-label="Perfil de miembro"></section>


    <!-- ======= BIO + TECHNICAL SHEET =======
         Grid: bio + socials (left) · sticky sheet (right)
         Populated by team.js
    ======= -->
    <section class="profile-body" id="profileBody">
      <div class="container profile-body__grid">

        <!-- Bio and social links -->
        <div>
          <p class="eyebrow">Sobre mí</p>
          <div id="profileBio"></div>
          <div class="profile-socials" id="profileSocials"></div>
        </div>

        <!-- Side sheet (sticky on desktop) -->
        <aside class="profile-sidebar" id="profileFicha" aria-label="Ficha del miembro"></aside>

      </div>
    </section>


    <!-- ======= EXTRA PHOTOS =======
         Additional member photo gallery.
         If photos_extra is empty in team.json, this section is hidden.
    ======= -->
    <section class="profile-photos section" id="profilePhotos">
      <div class="container">
        <p class="eyebrow reveal">Galería</p>
        <h2 class="section-title reveal">Más fotos</h2>
        <div class="profile-photos__grid" id="profilePhotosGrid"></div>
      </div>
    </section>


    <!-- ======= PROJECTS =======
         Projects the member has participated in.
         Cross-referenced: member.projects[] and portfolio.team_ids[] in team.js.
         If no projects, this section is hidden.
    ======= -->
    <section class="profile-projects section" id="profileProjects">
      <div class="container">
        <p class="eyebrow reveal">Filmografía</p>
        <h2 class="section-title reveal">Proyectos</h2>
        <div class="profile-projects__grid portfolio__grid" id="profileProjectsGrid"></div>
      </div>
    </section>

  </main>

  <!-- Footer: rendered by shared.js > renderFooter() -->
  <footer class="footer" id="footer" role="contentinfo"></footer>

  <!-- FAB WhatsApp -->
  <a href="#" class="fab-wa" target="_blank" rel="noopener" aria-label="Contactar por WhatsApp">
    <svg viewBox="0 0 24 24" aria-hidden="true">

  </a>

  <!--
    SCRIPTS — REQUIRED ORDER:
      1. shared.js  (utilities + window.UMD)
      2. team.js    (page logic)
    Paths are relative to the team/ subfolder
  -->
  <script src="../js/shared.js"></script>
  <script src="../js/team.js"></script>

</body>
</html>
