<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />

  <!-- Theme: light / dark
      Applied to <html> so CSS can use it with [data-theme="light"] or [data-theme="dark"]
      Populated dynamically from localStorage or media query (prefers-color-scheme)
  -->
  <script>
  (function () {
    var stored = localStorage.getItem('umd-theme');
    var theme = (stored === 'light' || stored === 'dark')
      ? stored
      : (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
    document.documentElement.setAttribute('data-theme', theme);
  })();
  </script>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a1a1a" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />

  <!-- SEO: title, description and canonical are dynamically overwritten by team.js -->
  <title>Marta Guerra — Directora de fotografía | UMD Films Málaga</title>
  <meta name="description" content="Marta Guerra, Directora de fotografía en UMD Films Málaga. Conoce a nuestro equipo." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://umdfilms.com/team/marta-guerra.html" />

  <!-- Open Graph (team.js overwrites title, description, image, url) -->
  <meta property="og:type"        content="profile" />
  <meta property="og:locale"      content="es_ES" />
  <meta property="og:site_name"   content="UMD Films" />
  <meta property="og:title"       content="Marta Guerra — Directora de fotografía | UMD Films Málaga" />
  <meta property="og:description" content="Marta Guerra, Directora de fotografía en UMD Films Málaga." />
  <meta property="og:image"       content="https://umdfilms.com/assets/team/marta-guerra/cover.avif" />
  <meta property="og:image:width"  content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:url"         content="https://umdfilms.com/team/marta-guerra.html" />

  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:site"        content="@UMDFilmsoficial" />
  <meta name="twitter:title"       content="Marta Guerra — Directora de fotografía | UMD Films Málaga" />
  <meta name="twitter:description" content="Marta Guerra, Directora de fotografía en UMD Films Málaga." />
  <meta name="twitter:image"       content="https://umdfilms.com/assets/team/marta-guerra/cover.avif" />

  <!-- Favicon -->
  <link rel="icon"             href="../assets/logo/favicon.ico" />
  <link rel="icon"             href="../assets/logo/favicon.svg"  type="image/svg+xml" />
  <link rel="apple-touch-icon" href="../assets/logo/apple-touch-icon.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap"
        rel="stylesheet" media="print" onload="this.media='all'" />
  <noscript>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
  </noscript>

  <!-- CSS: global + section-specific -->
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/team.css" />
</head>
<body>

  <a href="#contenido" class="skip-link">Saltar al contenido</a>

  <!-- Nav: rendered by shared.js > renderNav() -->
  <header class="nav" id="nav" role="banner"></header>

  <main id="contenido">

    <!-- ---- PROFILE HERO ------>
    <section class="profile-hero" id="profileHero" aria-label="Perfil de miembro"></section>


    <!-- ---- BIO + TECHNICAL SHEET ---- -->
    <section class="profile-body" id="profileBody">
      <div class="container profile-body__grid">

        <!-- Bio and social links -->
        <div>
          <p class="eyebrow">Sobre mí</p>
          <div id="profileBio"></div>
          <div class="profile-socials" id="profileSocials"></div>
        </div>

        <!-- Side sheet (sticky on desktop) -->
        <aside class="profile-sidebar" id="profileFicha" aria-label="Ficha del miembro"></aside>

      </div>
    </section>


    <!-- ---- EXTRA PHOTOS ---- -->
    <section class="profile-photos section" id="profilePhotos">
      <div class="container">
        <p class="eyebrow reveal">Galería</p>
        <h2 class="section-title reveal">Más fotos</h2>
        <div class="profile-photos__grid" id="profilePhotosGrid"></div>
      </div>
    </section>


    <!-- ---- PROJECTS ---- -->
    <section class="profile-projects section" id="profileProjects">
      <div class="container">
        <p class="eyebrow reveal">Filmografía</p>
        <h2 class="section-title reveal">Proyectos</h2>
        <div class="profile-projects__grid portfolio__grid" id="profileProjectsGrid"></div>
      </div>
    </section>

  </main>

  <!-- Footer: rendered by shared.js > renderFooter() -->
  <footer class="footer" id="footer" role="contentinfo"></footer>

  <!-- FAB WhatsApp -->
  <a class="fab-top" aria-label="Volver arriba"></a>

  <!-- ---- SCRIPTS ---- -->
  <script src="../js/shared.js"></script>
  <script src="../js/team.js"></script>

</body>
</html>
